<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 348" width="880" height="348" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="13" role="img" aria-label="Animated terminal: the AcmeCloud examples asking Metatate for decisions — marketing use of customer PII is denied, an EU Salesforce export is conditional on approval and anonymization, and an aggregate analytics query passes.">
  <title>Metatate examples — governed decisions for AI agents</title>
  <desc>A Python session against the AcmeCloud demo domain. authorize_use of customers for an email marketing campaign returns DENY with reason purpose.prohibited_use. authorize_use of customer_exports to a Salesforce destination in the EU returns CONDITIONAL requiring approval and anonymization. validate_query_context on an aggregate subscriptions query returns PASS.</desc>

  <defs>
    <clipPath id="screen">
      <rect x="0" y="34" width="880" height="314"/>
    </clipPath>
  </defs>

  <!-- terminal chrome -->
  <rect width="880" height="348" rx="10" fill="#0A1628"/>
  <rect width="880" height="34" rx="10" fill="#0F1E32"/>
  <rect y="26" width="880" height="8" fill="#0F1E32"/>
  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="17" r="6" fill="#27c93f"/>
  <text x="440" y="21" text-anchor="middle" fill="#8b949e" font-size="12">metatate-examples · AcmeCloud governed decisions for AI agents</text>
  <line x1="0" y1="34" x2="880" y2="34" stroke="#22314a" stroke-width="1"/>

  <g clip-path="url(#screen)">

    <!-- Q1: marketing use of customer PII -->
    <text x="24" y="70">
      <tspan fill="#C3FFB2">&gt;&gt;&gt; </tspan><tspan fill="#c9d1d9">client.authorize_use(</tspan><tspan fill="#4ECDC4">"customers"</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#4ECDC4">"read"</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#4ECDC4">"email marketing campaign"</tspan><tspan fill="#c9d1d9">)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.0219; 0.0313; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="96">
      <tspan fill="#FF6B5B" font-weight="bold">✗ DENY</tspan><tspan fill="#8b949e">  purpose.prohibited_use — customer PII is off-limits for marketing</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.0844; 0.0938; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>

    <!-- Q2: cross-border export to Salesforce -->
    <text x="24" y="132">
      <tspan fill="#C3FFB2">&gt;&gt;&gt; </tspan><tspan fill="#c9d1d9">client.authorize_use(</tspan><tspan fill="#4ECDC4">"customer_exports"</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#4ECDC4">"export"</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#4ECDC4">"sync to crm"</tspan><tspan fill="#c9d1d9">,</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.1531; 0.1625; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="154">
      <tspan fill="#0A1628">&gt;&gt;&gt; </tspan><tspan fill="#c9d1d9">                     destination={</tspan><tspan fill="#4ECDC4">"system"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#4ECDC4">"SALESFORCE"</tspan><tspan fill="#c9d1d9">, </tspan><tspan fill="#4ECDC4">"jurisdiction"</tspan><tspan fill="#c9d1d9">: </tspan><tspan fill="#4ECDC4">"EU"</tspan><tspan fill="#c9d1d9">})</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.1719; 0.1813; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="180">
      <tspan fill="#FBBF24" font-weight="bold">◐ CONDITIONAL</tspan><tspan fill="#8b949e">  approval_required · anonymize_first — cross-border transfer rules</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.2406; 0.2500; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>

    <!-- Q3: aggregate analytics query -->
    <text x="24" y="216">
      <tspan fill="#C3FFB2">&gt;&gt;&gt; </tspan><tspan fill="#c9d1d9">client.validate_query_context(</tspan><tspan fill="#4ECDC4">"SELECT plan_tier, COUNT(*) FROM subscriptions GROUP BY plan_tier"</tspan><tspan fill="#c9d1d9">)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.3156; 0.3250; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>
    <text x="24" y="242">
      <tspan fill="#C3FFB2" font-weight="bold">✓ PASS</tspan><tspan fill="#8b949e">  aggregate analytics on governed tables — allowed use</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.3906; 0.4000; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>

    <!-- footer -->
    <text x="24" y="284" fill="#6e7681">One synthetic company · five tables · three policies · typed decisions — offline or live
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.4656; 0.4750; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </text>

    <!-- idle prompt + blinking cursor -->
    <g>
      <text x="24" y="316" fill="#C3FFB2">&gt;&gt;&gt;</text>
      <rect x="56" y="305" width="8" height="14" fill="#C3FFB2">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.2s" repeatCount="indefinite"/>
      </rect>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0; 0.5031; 0.5125; 0.8438; 0.8750; 1" dur="16s" repeatCount="indefinite"/>
    </g>

  </g>
</svg>
