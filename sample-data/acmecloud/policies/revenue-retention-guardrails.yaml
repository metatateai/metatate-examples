# AcmeCloud estate spec — subscription revenue retention context.
apiVersion: metatate.io/v1
kind: DataPolicy
metadata:
  name: acme-retention
  version: 1.0.0
  description: >-
    Subscription and revenue facts support internal reporting with a
    five-year retention window after subscription end.
  tags: [retention_required, commercial_sensitive]
  businessContext:
    domain: Revenue Operations
    owner: Finance Analytics
    steward: finance-data@example.com
    purpose: >-
      Subscription revenue facts retained for renewal planning and financial
      reporting.
spec:
  enforcementMode: enforce
  priority: 90
  selector:
    databases: [acmecloud_demo]
    schemas: [public]
    tables: [subscriptions]
  classification:
    sensitivity: internal
    category: financial
  usage:
    permittedUses: [analytics, reporting, renewal_planning]
  retention:
    period: 5 years
    trigger: subscription end
    action: archive
extensions:
  displayName: AcmeCloud revenue retention guardrails
