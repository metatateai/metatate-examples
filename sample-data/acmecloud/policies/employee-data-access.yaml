# AcmeCloud estate spec — role-gated employee data access.
apiVersion: metatate.io/v1
kind: DataPolicy
metadata:
  name: acme-employee-access
  version: 1.0.0
  description: >-
    Employee records are readable by people-operations roles only; public
    access is denied.
  tags: [hr, pii]
  businessContext:
    domain: People Operations
    owner: People Operations
    steward: hr-data@example.com
    purpose: Role-gated access to employee records.
spec:
  enforcementMode: enforce
  priority: 550
  selector:
    databases: [acmecloud_demo]
    schemas: [public]
    tables: [employees]
  classification:
    sensitivity: confidential
    category: pii
  accessControl:
    allowedRoles: [HR_ADMIN, PEOPLE_OPS]
    deniedRoles: [PUBLIC]
  usage:
    permittedUses: [reporting]
extensions:
  displayName: AcmeCloud employee data access
