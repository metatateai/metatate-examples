# AcmeCloud estate spec — email masking, TAXONOMY-targeted.
# "Classify once, govern everywhere": the selector targets the taxonomy type
# `pii.contact.email`, so the engine resolves the policy to EVERY column the
# catalog classifies as an email — customers.email, customer_exports.email,
# and employees.work_email — via taxonomy resolution paths, with no per-column
# selector maintenance as the estate grows.
apiVersion: metatate.io/v1
kind: DataPolicy
metadata:
  name: acme-email-masking
  version: 1.0.0
  description: >-
    Email addresses are partially masked outside exempt data-steward roles,
    wherever the catalog classifies a column as an email address.
  tags: [pii, privacy_sensitive]
  businessContext:
    domain: Customer Data
    owner: Privacy Office
    steward: privacy-review@example.com
    purpose: Display protection for customer contact email addresses.
spec:
  enforcementMode: enforce
  priority: 550
  selector:
    databases: [acmecloud_demo]
    schemas: [public]
    taxonomyTypes: [pii.contact.email]
  classification:
    sensitivity: confidential
    category: pii.contact
  accessControl:
    masking:
      type: partial
      exemptRoles: [DATA_STEWARD, PRIVACY_ADMIN]
extensions:
  displayName: AcmeCloud email masking (taxonomy)
