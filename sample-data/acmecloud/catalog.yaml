# =============================================================================
# AcmeCloud estate spec — catalog layer.
#
# The single public source of truth for the AcmeCloud demo catalog: tables,
# columns, business descriptions, tags, and the initial column classification
# against the Metatate taxonomy (built-in `pii.* / financial.* / technical.*`
# type ids, plus tenant custom types under the reserved `custom.` prefix).
# metatate-saas vendors this file (packages/test-fixtures) and derives the
# provisioned demo content from it with the REAL governance engine — nothing
# downstream is hand-authored.
# =============================================================================

connector:
  name: AcmeCloud sample warehouse
  kind: postgres
database: acmecloud_demo
schema: public

# Tenant custom data types (the `custom.` prefix is fenced — it can never
# shadow a built-in taxonomy id). Provisioned alongside the demo so the
# catalog shows taxonomy extensibility, and referenced by column
# classifications below.
customTypes:
  - id: custom.sales_region
    label: Sales region
    description: AcmeCloud's internal sales-territory segmentation.
    sensitivity: internal
    isPii: false
  - id: custom.consent_flag
    label: Marketing consent flag
    description: A customer's recorded marketing-consent choice.
    sensitivity: confidential
    isPii: true
  - id: custom.support_free_text
    label: Support free text
    description: Customer-authored free text that may embed personal data.
    sensitivity: confidential
    isPii: true
  - id: custom.churn_risk_score
    label: Churn risk score
    description: Model-derived churn propensity for a customer account.
    sensitivity: internal
    isPii: false

tables:
  - name: customers
    description: Customer master data for the AcmeCloud demo domain.
    tags: [pii, privacy_sensitive]
    columns:
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: customer_name
        dataType: text
        nullable: false
        classification: { dataTypeId: pii.identity.full_name, sensitivity: confidential, isPii: true, source: pattern }
      - name: email
        dataType: text
        nullable: false
        description: Primary contact email address for the customer.
        tags: [contact, pii]
        classification: { dataTypeId: pii.contact.email, sensitivity: confidential, isPii: true, source: pattern }
      - name: account_status
        dataType: text
        nullable: false
      - name: arr
        dataType: numeric
        nullable: true
        classification: { dataTypeId: financial.revenue, sensitivity: internal, isPii: false, source: pattern }
      - name: region
        dataType: text
        nullable: true
        classification: { dataTypeId: custom.sales_region, sensitivity: internal, isPii: false, source: manual }
      - name: marketing_consent
        dataType: text
        nullable: true
        classification: { dataTypeId: custom.consent_flag, sensitivity: confidential, isPii: true, source: manual }
      - name: created_at
        dataType: timestamptz
        nullable: false
  - name: subscriptions
    description: Subscription revenue facts (plan, ARR, term).
    tags: [financial, retention_required]
    columns:
      - name: subscription_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: plan
        dataType: text
        nullable: false
      - name: arr
        dataType: numeric
        nullable: false
        classification: { dataTypeId: financial.revenue, sensitivity: internal, isPii: false, source: pattern }
      - name: start_date
        dataType: date
        nullable: false
      - name: end_date
        dataType: date
        nullable: true
  - name: product_usage_events
    description: Product telemetry events keyed by customer and device.
    tags: [telemetry]
    columns:
      - name: event_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: device_id
        dataType: text
        nullable: true
        classification: { dataTypeId: technical.device_id, sensitivity: confidential, isPii: true, source: pattern }
      - name: event_name
        dataType: text
        nullable: false
      - name: occurred_at
        dataType: timestamptz
        nullable: false
  - name: support_tickets
    description: Customer support tickets with free-text bodies.
    tags: [support, ai_training_blocked]
    columns:
      - name: ticket_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: ticket_text
        dataType: text
        nullable: false
        description: Free-text ticket body written by the customer.
        tags: [free_text, pii]
        classification: { dataTypeId: custom.support_free_text, sensitivity: confidential, isPii: true, source: manual }
      - name: priority
        dataType: text
        nullable: false
      - name: opened_at
        dataType: timestamptz
        nullable: false
  - name: customer_exports
    description: Prepared customer export payloads awaiting destination-aware authorization.
    tags: [restricted_transfer]
    columns:
      - name: export_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: email
        dataType: text
        nullable: false
        classification: { dataTypeId: pii.contact.email, sensitivity: restricted, isPii: true, source: pattern }
      - name: destination_system
        dataType: text
        nullable: false
      - name: exported_at
        dataType: timestamptz
        nullable: false
  - name: payment_methods
    description: Stored payment instruments for customer billing (tokenized).
    tags: [pci, billing]
    columns:
      - name: payment_method_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: card_token
        dataType: text
        nullable: false
        description: Vault token referencing the stored card (never the PAN).
        tags: [pci]
        classification: { dataTypeId: financial.credit_card, sensitivity: restricted, isPii: true, source: pattern }
      - name: card_last4
        dataType: text
        nullable: false
        classification: { dataTypeId: financial.credit_card, sensitivity: confidential, isPii: true, source: pattern }
      - name: created_at
        dataType: timestamptz
        nullable: false
  - name: employees
    description: AcmeCloud employee records for people operations.
    tags: [hr, pii]
    columns:
      - name: employee_id
        dataType: uuid
        nullable: false
      - name: full_name
        dataType: text
        nullable: false
        classification: { dataTypeId: pii.identity.full_name, sensitivity: confidential, isPii: true, source: pattern }
      - name: work_email
        dataType: text
        nullable: false
        classification: { dataTypeId: pii.contact.email, sensitivity: confidential, isPii: true, source: pattern }
      - name: national_id
        dataType: text
        nullable: true
        classification: { dataTypeId: pii.government_id.national_id, sensitivity: restricted, isPii: true, source: manual }
      - name: salary
        dataType: numeric
        nullable: true
        classification: { dataTypeId: financial.salary, sensitivity: restricted, isPii: true, source: pattern }
      - name: region
        dataType: text
        nullable: true
        classification: { dataTypeId: custom.sales_region, sensitivity: internal, isPii: false, source: manual }
  - name: ml_feature_store
    description: Model features derived from product usage and revenue signals.
    tags: [ml, telemetry]
    columns:
      - name: feature_id
        dataType: uuid
        nullable: false
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: churn_score
        dataType: numeric
        nullable: false
        classification: { dataTypeId: custom.churn_risk_score, sensitivity: internal, isPii: false, source: manual }
      - name: computed_at
        dataType: timestamptz
        nullable: false
  - name: legacy_customer_backup
    description: ""
    tags: []
    columns:
      - name: customer_id
        dataType: uuid
        nullable: false
      - name: customer_name
        dataType: text
        nullable: false
      - name: email
        dataType: text
        nullable: false
      - name: exported_at
        dataType: timestamptz
        nullable: true
