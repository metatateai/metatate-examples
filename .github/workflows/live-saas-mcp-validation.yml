name: Live SaaS MCP Validation

# Runs the notebook pack + acceptance scripts against the Metatate SaaS
# (cross-platform) MCP endpoint. Prereq (operator step, not CI): the target
# workspace serves the AcmeCloud demo publication — locally via
# metatate-saas/scripts/acmecloud-demo-fixtures.sh, on staging by applying the
# same script once. The token is a real workspace-issued MCP access token
# (MCP module → Tokens), never the deterministic local fixture token.

on:
  workflow_dispatch:
    inputs:
      run_notebook_pack:
        description: Execute the live core notebook pack.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      run_langgraph_notebook:
        description: Execute the live LangGraph runtime notebook.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  live-saas-mcp:
    name: Live SaaS MCP validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      METATATE_EXAMPLES_MODE: live
      METATATE_MCP_BACKEND: saas
      METATATE_MCP_URL: ${{ secrets.METATATE_SAAS_MCP_URL }}
      METATATE_MCP_PAT_ENV: METATATE_SAAS_MCP_TOKEN
      METATATE_SAAS_MCP_TOKEN: ${{ secrets.METATATE_SAAS_MCP_TOKEN }}
      METATATE_MCP_TIMEOUT_SECONDS: "120"
      METATATE_MCP_RETRY_ATTEMPTS: "4"
      METATATE_MCP_RETRY_BACKOFF_SECONDS: "1"
      JUPYTER_BIN: jupyter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-live.txt
            requirements-framework.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-live.txt
          pip install -r requirements-framework.txt

      - name: Validate required secrets
        run: |
          test -n "${METATATE_MCP_URL}"
          test -n "${METATATE_SAAS_MCP_TOKEN}"

      - name: Static validation
        run: PYTHONDONTWRITEBYTECODE=1 python3 scripts/validate_examples.py

      - name: Live CI/CD policy gate acceptance
        run: scripts/run_cicd_policy_gate_acceptance.sh

      - name: Live dbt adapter acceptance
        run: scripts/run_cicd_dbt_adapter_acceptance.sh

      - name: Live human exception workflow acceptance
        run: scripts/run_human_exception_workflow_acceptance.sh

      - name: Live framework runtime acceptance
        run: scripts/run_framework_runtime_acceptance.sh

      - name: Live governed agent arc acceptance
        run: scripts/run_governed_agent_arc_acceptance.sh

      - name: Execute live core notebook pack
        if: inputs.run_notebook_pack == 'true'
        env:
          METATATE_NOTEBOOK_OUTPUT_DIR: ${{ runner.temp }}/metatate-examples-saas-notebooks
        run: scripts/run_notebook_pack.sh

      - name: Execute live LangGraph runtime notebook
        if: inputs.run_langgraph_notebook == 'true'
        env:
          METATATE_NOTEBOOK_OUTPUT_DIR: ${{ runner.temp }}/metatate-examples-saas-langgraph-notebook
        run: scripts/run_langgraph_runtime_notebook.sh
